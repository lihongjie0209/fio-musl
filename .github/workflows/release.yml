name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: fio-x86_64
            image: alpine:3.20
            platform: linux/amd64

          - arch: aarch64
            artifact: fio-aarch64
            image: arm64v8/alpine:3.20
            platform: linux/arm64

          - arch: armv7l
            artifact: fio-armv7l
            image: arm32v7/alpine:3.20
            platform: linux/arm/v7

          - arch: riscv64
            artifact: fio-riscv64
            image: riscv64/alpine:edge
            platform: linux/riscv64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for cross-arch containers
        if: matrix.arch != 'x86_64'
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Build fio in Alpine container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD:/work" -w /work \
            ${{ matrix.image }} \
            sh -c "
              apk add --no-cache gcc musl-dev make linux-headers libaio-dev \
              && ./configure --build-static \
              && make -j\$(nproc) fio \
              && mv fio ${{ matrix.artifact }}
            "

      - name: Verify binary
        run: file ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p assets
          find artifacts -type f -exec cp {} assets/ \;
          ls -lh assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
